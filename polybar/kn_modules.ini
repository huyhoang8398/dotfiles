[module/spotify]
type = custom/script
interval = 1
format-prefix = " "
format = <label>
exec = python ~/script/spotify_status.py -f '{artist}: {song}'
format-underline = #ffffff

[module/system-fan-speed]
type = custom/script
exec = ~/script/system-fan-speed.sh
interval = 10

[module/popup-calendar]
type = custom/script
exec = ~/script/popup-calendar.sh
format = <label>
format-prefix = " "
format-prefix-foreground = ${color.red}
interval = 5
click-left = ~/script/popup-calendar.sh --popup &
